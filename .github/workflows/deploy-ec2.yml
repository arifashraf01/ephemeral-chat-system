name: Deploy To EC2

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/deploy-ec2.yml
  workflow_dispatch:

env:
  EC2_PORT: 22
  SERVER_PATH: /home/ubuntu/ephemeral-chat-system

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$EC2_HOST" ]; then
            echo "Missing repository secret: EC2_HOST"
            missing=1
          fi
          if [ -z "$EC2_USER" ]; then
            echo "Missing repository secret: EC2_USER"
            missing=1
          fi
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "Missing repository secret: EC2_SSH_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Create the missing secrets in repo settings: Secrets and variables -> Actions"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p $EC2_PORT -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote temp directories
        run: |
          ssh -i ~/.ssh/ec2_key -p $EC2_PORT "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            mkdir -p /tmp/chatapp-dist
          '

      - name: Upload frontend artifacts
        run: |
          scp -i ~/.ssh/ec2_key -P $EC2_PORT -r frontend/dist/* "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/chatapp-dist/"

      - name: Upload backend source archive
        run: |
          tar -czf /tmp/backend.tgz backend
          scp -i ~/.ssh/ec2_key -P $EC2_PORT /tmp/backend.tgz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/backend.tgz"

      - name: Deploy frontend on server
        run: |
          ssh -i ~/.ssh/ec2_key -p $EC2_PORT "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            sudo mkdir -p /var/www/chatapp
            sudo cp -r /tmp/chatapp-dist/* /var/www/chatapp/
            sudo chown -R www-data:www-data /var/www/chatapp
            sudo find /var/www/chatapp -type d -exec chmod 755 {} \;
            sudo find /var/www/chatapp -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx
          '

      - name: Deploy backend on server
        run: |
          ssh -i ~/.ssh/ec2_key -p $EC2_PORT "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            mkdir -p "$SERVER_PATH"
            rm -rf "$SERVER_PATH/backend"
            tar -xzf /tmp/backend.tgz -C "$SERVER_PATH"
            cd "$SERVER_PATH/backend"
            chmod +x mvnw
            ./mvnw -q -DskipTests package
            sudo systemctl restart chatapp
            sudo systemctl is-active chatapp
          '
