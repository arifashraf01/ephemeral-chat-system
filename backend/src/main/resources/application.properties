spring.application.name=chatapp
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:change-this-secret-to-env-managed-value-please-override-in-production}
jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:3600000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}

app.mail.from=${MAIL_FROM:}
